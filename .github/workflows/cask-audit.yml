name: cask-audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Run Homebrew cask audit
        env:
          HOMEBREW_DEVELOPER: "1"
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: ./scripts/audit-cask.sh
